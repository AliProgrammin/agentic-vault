map $http_accept $av_markdown {
    default       "";
    "~*text/markdown" "yes";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  location ~* \.mp4$ {
    gzip off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Accept-Ranges bytes;
    add_header Cache-Control "public, max-age=86400";
  }

  # api-catalog has no file extension; declare content-type explicitly
  location = /.well-known/api-catalog {
    default_type "application/linkset+json";
    try_files $uri =404;
  }

  # http-message-signatures-directory has no extension; must return JSON
  location = /.well-known/http-message-signatures-directory {
    default_type "application/json";
    try_files $uri =404;
  }

  # All other .well-known paths: serve the file or 404 — no SPA fallback
  location ^~ /.well-known/ {
    try_files $uri =404;
  }

  # Markdown variant for agents (also accessible directly)
  location = /index.md {
    default_type "text/markdown";
    charset utf-8;
    try_files $uri =404;
  }

  # Homepage: content negotiation + agent discovery Link header
  location = / {
    if ($av_markdown = "yes") {
      rewrite ^ /index.md last;
    }
    try_files /index.html =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Cache-Control "public, max-age=300" always;
    add_header Link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="mcp-server", </sitemap.xml>; rel="sitemap"' always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Cache-Control "public, max-age=300" always;
  }

  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
